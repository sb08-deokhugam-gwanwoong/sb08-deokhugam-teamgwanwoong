server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:deokhugam;MODE=PostgreSQL # 메모리 모드 + PG 호환
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      connection-init-sql: "" # H2에서는 초기화 SQL 실행 안 함
  cloud:
    aws:
      s3:
        bucket: ${AWS_BUCKET_NAME}
      region:
        static: ${AWS_REGION}
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}

  # Spring Boot의 SQL 초기화 기능 끄기 (Hibernate 기능 사용)
  sql:
    init:
      mode: never

  h2:
    console:
      enabled: true
      path: /h2-console # 접속 주소

  jpa:
    database: h2
    database-platform: org.hibernate.dialect.H2Dialect
    generate-ddl: true
    # data-h2.sql 실행을 JPA 초기화 이후로 지연시킴 (테이블 생성 후 데이터 삽입)
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop # 시작 시 테이블 생성하고 종료 시 삭제
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true # SQL 예쁘게 출력하기
        highlight_sql: true
        use_sql_comments: true
        # Hibernate가 테이블 생성 후 이 스크립트를 실행하도록 설정
        hbm2ddl.import_files: classpath:data-h2.sql

logging:
  level:
    # 실행되는 SQL 출력
    org.hibernate.SQL: debug
    # 바인딩되는 파라미터 출력
    org.hibernate.orm.jdbc.bind: trace

# Naver API
naver:
  api:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
  url:
    search:
      book: "https://openapi.naver.com/v1/search/book.json"