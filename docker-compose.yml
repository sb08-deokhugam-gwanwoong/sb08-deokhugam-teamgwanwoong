version: '3.8'

services:
  # 애플리케이션 서비스
  deokhugam-app:
    container_name: deokhugam-app
    build: . # 현재 디렉토리의 Dockerfile 사용
    ports:
      - "8080:8080" # 호스트 8080, 컨테이너 8080
    env_file:
      - .env # 환경변수 주입
    environment:
      # DB 접속 정보
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
      # Storage 설정 (추가)
      - STORAGE_TYPE=${STORAGE_TYPE}
      - AWS_S3_ACCESS_KEY=${AWS_S3_ACCESS_KEY}
      - AWS_S3_SECRET_KEY=${AWS_S3_SECRET_KEY}
      - AWS_S3_REGION=${AWS_S3_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - REDIS_HOST=deokhugam-redis
      - REDIS_PORT=6379
      - spring.elasticsearch.uris=http://deokhugam-es:9200/
    depends_on:
      deokhugam-db:
        condition: service_healthy
      deokhugam-redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy

    volumes:
      - ./.deokhugam:/app/.deokhugam # 로컬 파일 저장소
      - ./.deokhugam-files:/app/.deokhugam-files # 파일 저장소
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deokhugam-network

  # DB 서비스 (PostgreSQL)
  deokhugam-db:
    container_name: deokhugam-db
    image: postgres:17.2
    environment:
      - POSTGRES_DB=${PGDATABASE}
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data # DB 데이터 유지
      # 초기화 스크립트 (최초 실행 시 자동 실행)
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PGUSER} -d ${PGDATABASE}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432" # 호스트 접속 가능
    networks:
      - deokhugam-network

  # 프로메테우스
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - deokhugam-network
    restart: always

  # 그라파나
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - deokhugam-network
    restart: always

  # Redis
  deokhugam-redis:
    container_name: deokhugam-redis
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - deokhugam-network
    restart: always

  # Elasticsearch
  elasticsearch:
    container_name: deokhugam-es
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    build:
      context: .
      dockerfile: elasticsearch.Dockerfile
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # 메모리 제한 필수
    volumes:
      - ./.es-data:/usr/share/elasticsearch/data # 검색 데이터 영구 저장 (EC2 재부팅 방어)
    restart: always
    ports:
      - "9200:9200"
    networks:
      - deokhugam-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: deokhugam-ls
    restart: always
    volumes:
      # 1. 설정 파일 마운트 (우리가 작성한 .conf 파일)
      - ./logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      # 2. JDBC 드라이버 마운트
      - ./logstash/drivers/postgresql-42.7.3.jar:/usr/share/logstash/logstash-core/lib/jars/postgresql.jar:ro
      # 3. 마지막 동기화 위치 저장 (파일로 남겨둬야 컨테이너 재시작해도 이어서 함)
      - deokhugam-logstash-data:/usr/share/logstash/data
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m # 메모리 설정
      - PGHOST=${PGHOST}
      - PGPORT=${PGPORT}
      - PGDATABASE=${PGDATABASE}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
      - ES_HOSTS=${ES_HOSTS}
    depends_on:
      deokhugam-db:
        condition: service_started
      elasticsearch:
        condition: service_started
    networks:
      - deokhugam-network

networks:
  deokhugam-network:
    driver: bridge

# 데이터를 영구 저장할 볼륨
volumes:
  deokhugam-db-data:
  deokhugam-logstash-data:
  deokhugam-es-data: