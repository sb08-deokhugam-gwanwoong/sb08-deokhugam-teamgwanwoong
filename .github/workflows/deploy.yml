name: Deploy to EC2 via Docker Compose

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 1. ECR Public 로그인 및 이미지 푸시 (기존 유지)
      - name: Configure AWS credentials for ECR Public
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build, tag, and push image to Amazon ECR Public
        env:
          ECR_REGISTRY: ${{ steps.login-ecr-public.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_URI }}
        run: |
          # 최신 버전(latest)으로 빌드 후 ECR에 업로드
          docker build --no-cache -t $ECR_REPOSITORY:latest .
          docker push $ECR_REPOSITORY:latest

      # 2. EC2로 docker-compose.yml 및 설정 파일 전송
      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml, logstash/, prometheus.yml"
          target: "/home/ec2-user/deokhugam-deploy"

      # 3. EC2 접속 후 Docker Compose 실행
      - name: Execute Docker Compose on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 전송된 폴더로 이동
            cd /home/ec2-user/deokhugam-deploy
            
            # ECR에서 방금 올린 최신 앱 이미지 당겨오기 (Public이라 별도 로그인 불필요)
            docker-compose pull deokhugam-app
            
            # 전체 서비스 최신화 및 실행 (변경된 앱 컨테이너만 재시작됨)
            docker-compose up -d